<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Claude Code na Prática — Curso gratuito · Pietro Mauro</title>
    <meta name="description" content="Curso gratuito, prático e objetivo de Claude Code: setup, contexto, comandos, MCP, hooks e o SDK. Por Pietro Mauro — IA que opera resultado." />
    <meta property="og:title" content="Claude Code na Prática — Curso gratuito" />
    <meta property="og:description" content="Domine o Claude Code do setup ao SDK. Direto ao ponto, com a operação no centro." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      // tema: claro nativo por padrão; respeita escolha salva. Setado antes do paint (sem flash).
      (function () {
        try {
          var t = localStorage.getItem('tema') || 'light';
          document.documentElement.setAttribute('data-theme', t);
          var m = document.querySelector('meta[name=theme-color]');
          if (m) m.setAttribute('content', t === 'dark' ? '#0a0a0b' : '#ffffff');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
